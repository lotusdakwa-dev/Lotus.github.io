<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Ajouter un Élève - Gestion Inscriptions</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5" style="max-width: 600px;">
        <div class="card p-4 shadow border-0" style="border-radius: 15px;">
            <h3 class="mb-4 fw-bold text-info text-center">Inscrire un Nouvel Élève</h3>
            <p class="text-muted text-center small">Remplissez les informations ci-dessous pour l'ajouter à la base de données.</p>
            <hr>
            
            <form method="POST">
                {% csrf_token %}
                
                {% for field in form %}
                    <div class="mb-3">
                        <label class="form-label fw-bold small text-secondary">{{ field.label }}</label>
                        {{ field }}
                        {% if field.errors %}
                            <div class="text-danger small">{{ field.errors }}</div>
                        {% endif %}
                    </div>
                {% endfor %}
                
                <div class="mt-4 d-flex justify-content-between">
                    <button type="submit" class="btn btn-info text-white px-4 fw-bold" style="border-radius: 20px;">Enregistrer l'Élève</button>
                    <a href="{% url 'dashboard' %}" class="btn btn-secondary px-4 fw-bold" style="border-radius: 20px;">Annuler</a>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
